<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerar Ordem de Serviço</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2E7D32;
            --secondary-color: #4CAF50;
            --accent-color: #FFC107;
            --danger-color: #D32F2F;
            --success-color: #388E3C;
            --text-light: #FFFFFF;
            --text-dark: #212121;
            --bg-light: #F1F8E9;
            --card-bg: #FFFFFF;
            --item-bg: #E8F5E9;
            --item-hover: #C8E6C9;
            --shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            color: var(--text-light);
            text-align: center;
            width: 100%;
            padding: 1.5rem 0;
            box-shadow: var(--shadow);
        }

        .container {
            max-width: 800px;
            width: 90%;
            margin: 2rem auto;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        input,
        select,
        textarea {
            margin-bottom: 1rem;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
        }

        .btn {
            border: none;
            border-radius: 50px;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--primary-color);
            color: var(--text-light);
        }

        .btn:hover {
            background: var(--secondary-color);
        }

        .btn-voltar {
            background: var(--success-color);
            color: var(--text-light);
            text-decoration: none;
            margin-top: 1.5rem;
            display: block;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
        }

        .btn-voltar:hover {
            background: #388e3c;
        }

        @media (max-width: 600px) {
            .container {
                width: 95%;
                padding: 1rem;
            }

            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>Gerar Ordem de Serviço</h1>
    </header>
    <div class="container">
        <form id="ordemForm">
            <label for="tipoManutencao">Tipo de Manutenção</label>
            <select id="tipoManutencao" required>
                <option value="">Selecione</option>
                <option value="Preventiva">Preventiva</option>
                <option value="Corretiva">Corretiva</option>
            </select>

            <label for="tipoServico">Tipo de Serviço</label>
            <input type="text" id="tipoServico" required>

            <label for="maquina">Máquina/Equipamento</label>
            <input type="text" id="maquina" required>

            <label for="setor">Setor</label>
            <input type="text" id="setor" required>

            <label for="descricao">Descrição</label>
            <textarea id="descricao" rows="4" required></textarea>

            <label for="prioridade">Prioridade</label>
            <select id="prioridade" required>
                <option value="">Selecione</option>
                <option value="Baixa">Baixa</option>
                <option value="Média">Média</option>
                <option value="Alta">Alta</option>
            </select>

            <button type="submit" class="btn">
                <i class="fas fa-save"></i> Salvar Ordem de Serviço
            </button>
        </form>
        <a href="index.html" class="btn btn-voltar">
            <i class="fas fa-arrow-left"></i> Voltar para a Página Inicial
        </a>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCVX-HYIsoK7nYcRJidsKg8xIu644KkU1g",
            authDomain: "ordemservico-932db.firebaseapp.com",
            databaseURL: "https://ordemservico-932db-default-rtdb.firebaseio.com",
            projectId: "ordemservico-932db",
            storageBucket: "ordemservico-932db.firebasestorage.app",
            messagingSenderId: "45467201855",
            appId: "1:45467201855:web:4d087556b1e0c8e2ad638a"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        document.getElementById('ordemForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const ordem = {
                tipoManutencao: document.getElementById('tipoManutencao').value,
                tipoServico: document.getElementById('tipoServico').value,
                maquina: document.getElementById('maquina').value,
                setor: document.getElementById('setor').value,
                descricao: document.getElementById('descricao').value,
                prioridade: document.getElementById('prioridade').value,
                dataHora: new Date().toLocaleString()
            };

            database.ref('ordensServico').push(ordem)
                .then(() => {
                    alert('Ordem de Serviço gerada com sucesso!');
                    document.getElementById('ordemForm').reset();
                })
                .catch((error) => {
                    console.error("Erro ao gerar ordem de serviço:", error);
                });
        });
    </script>
</body>

</html>
