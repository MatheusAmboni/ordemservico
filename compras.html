<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compras de Materiais</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Adicione aqui os estilos necessários */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            width: 90%;
            margin: 2rem auto;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
        }

        .material-list {
            list-style: none;
            padding: 0;
        }

        .material-list li {
            background: var(--item-bg);
            margin: 0.5rem 0;
            padding: 1rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
        }

        .material-list li i {
            margin-right: 1rem;
        }

        .material-list li span {
            font-weight: 500;
        }
    </style>
</head>

<body>
    <header>
        <h1>Compras de Materiais</h1>
    </header>
    <div class="container">
        <p>Conteúdo da página de compras de materiais.</p>
        <ul class="material-list">
            <li><i class="fas fa-screwdriver"></i><span>Parafusos</span></li>
            <li><i class="fas fa-wrench"></i><span>Materiais de Manutenção</span></li>
            <li><i class="fas fa-paint-roller"></i><span>Tintas</span></li>
            <li><i class="fas fa-hammer"></i><span>Ferramentas</span></li>
        </ul>
    </div>
</body>

</html>
